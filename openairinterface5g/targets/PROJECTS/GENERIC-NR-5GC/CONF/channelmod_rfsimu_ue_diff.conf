#/* Per-UE asymmetric channel configuration for dApp evaluation */
#/* Based on OAI official channel_simulation.md example */
#/* ploss_dB=20 for both UEs (signal attenuation) → noise_power_dB creates effective SNR gap */
#/* UE0 (rfsimu_channel_ue0): good channel  – noise=-4dB  → high SNR */
#/* UE1 (rfsimu_channel_ue1): poor channel  – noise=-2dB  → low SNR  (~10dB gap expected) */
channelmod = {
  max_chan = 10;
  modellist = "modellist_rfsimu_1";
  modellist_rfsimu_1 = (
    {
      model_name     = "rfsimu_channel_ue0";
      type           = "TDL_C";
      ploss_dB       = 20;
      noise_power_dB = -4;
      forgetfact     = 0.99;
      offset         = 0;
      ds_tdl         = 10e-9;
    },
    {
      model_name     = "rfsimu_channel_ue1";
      type           = "TDL_C";
      ploss_dB       = 20;
      noise_power_dB = -2;
      forgetfact     = 0.99;
      offset         = 0;
      ds_tdl         = 10e-9;
    }
  );
};
